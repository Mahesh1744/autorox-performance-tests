  # ── BREAKPOINT ──────────────────────────────
  breakpoint:
    name: Breakpoint Test (100→2000 VUs · auto-stop)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.test_type == 'breakpoint'
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Breakpoint Test
        env:
          PERF_BASE_URL: ${{ secrets.PERF_BASE_URL }}
          PERF_USERNAME: ${{ secrets.PERF_USERNAME }}
          PERF_PASSWORD: ${{ secrets.PERF_PASSWORD }}
        run: |
          mkdir -p k6-perf-tests/results
          k6 run k6-perf-tests/breakpoint-test.js \
            --out json=k6-perf-tests/results/breakpoint_ci.json \
            --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            2>&1 | tee k6-perf-tests/results/breakpoint_ci.log || true

      - name: Post Breakpoint Summary
        if: always()
        run: |
          echo "## Breakpoint Test — System Saturation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> The test auto-stopped when error rate exceeded 10%." >> $GITHUB_STEP_SUMMARY
          echo "> The VU count at abort time = system breakpoint." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "http_req_duration|http_req_failed|vus|iterations|breakpoint" \
            k6-perf-tests/results/breakpoint_ci.log | tail -20 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack with Breakpoint Result
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VUS=$(grep "vus_max" k6-perf-tests/results/breakpoint_ci.log | grep -oP 'max=\K[0-9]+' | tail -1 || echo "unknown")
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \":bar_chart: *Autorox Breakpoint Test Complete* — Run #${{ github.run_number }}\",
              \"attachments\": [{
                \"color\": \"warning\",
                \"fields\": [
                  {\"title\": \"Max VUs reached\", \"value\": \"${VUS} VUs\", \"short\": true},
                  {\"title\": \"Stopped by\", \"value\": \"Error rate > 10%\", \"short\": true},
                  {\"title\": \"View Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }]
            }"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: breakpoint-results-${{ github.run_number }}
          path: k6-perf-tests/results/breakpoint_ci.*
          retention-days: 30
