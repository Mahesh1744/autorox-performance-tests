          PERF_BASE_URL:   ${{ secrets.PERF_BASE_URL }}
          PERF_USERNAME:   ${{ secrets.PERF_USERNAME }}
          PERF_PASSWORD:   ${{ secrets.PERF_PASSWORD }}
          K6_CLOUD_TOKEN:  ${{ secrets.K6_CLOUD_TOKEN }}
        run: |
          mkdir -p k6-perf-tests/results
          CLOUD_OUT=""
          [ -n "$K6_CLOUD_TOKEN" ] && CLOUD_OUT="--out cloud"
          k6 run k6-perf-tests/load-test.js \
            --out json=k6-perf-tests/results/load_ci.json \
            --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            $CLOUD_OUT \
            2>&1 | tee k6-perf-tests/results/load_ci.log

      - name: Post Job Summary
        if: always()
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
