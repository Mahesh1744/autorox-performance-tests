name: Autorox API Performance Tests

on:
  push:
    branches: [main, master]
    paths: ['k6-perf-tests/**']
  pull_request:
    branches: [main, master]
    paths: ['k6-perf-tests/**']
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Which test to run'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, load, stress, spike, soak, scalability, all]

jobs:

  # ── SMOKE (every push / PR) ─────────────────
  smoke:
    name: Smoke Test (1 VU · 2 min)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'smoke' || github.event.inputs.test_type == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Smoke Test
        env:
          PERF_BASE_URL:   ${{ secrets.PERF_BASE_URL }}
          PERF_USERNAME:   ${{ secrets.PERF_USERNAME }}
          PERF_PASSWORD:   ${{ secrets.PERF_PASSWORD }}
          K6_CLOUD_TOKEN:  ${{ secrets.K6_CLOUD_TOKEN }}
        run: |
          mkdir -p k6-perf-tests/results
          CLOUD_OUT=""
          [ -n "$K6_CLOUD_TOKEN" ] && CLOUD_OUT="--out cloud"
          k6 run k6-perf-tests/smoke-test.js \
            --out json=k6-perf-tests/results/smoke_ci.json \
            --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            $CLOUD_OUT \
            2>&1 | tee k6-perf-tests/results/smoke_ci.log

      - name: Post Job Summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "✓|✗|checks_|http_req_duration|http_req_failed|iterations|workshopId" \
            k6-perf-tests/results/smoke_ci.log | tail -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ github.run_number }}
          path: k6-perf-tests/results/smoke_ci.*
          retention-days: 30

  # ── LOAD ────────────────────────────────────
  load:
    name: Load Test (25 VUs · 8 min)
    runs-on: ubuntu-latest
    needs: smoke
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'load' || github.event.inputs.test_type == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Load Test
