            -H 'Content-type: application/json' \
            -d "{
              \"text\": \":red_circle: *Autorox Load Test FAILED* — Run #${{ github.run_number }}\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"View Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }]
            }"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-results-${{ github.run_number }}
          path: k6-perf-tests/results/load_ci.*
          retention-days: 30

  # ── STRESS ──────────────────────────────────
  stress:
    name: Stress Test (100→1000 VUs · 14 min)
    runs-on: ubuntu-latest
    needs: load
    if: >
      github.event_name == 'schedule' ||
