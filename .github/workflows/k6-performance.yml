  # ── SOAK ────────────────────────────────────
  soak:
    name: Soak Test (150 VUs · 60 min)
    runs-on: ubuntu-latest
    needs: load
    timeout-minutes: 75
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'soak' || github.event.inputs.test_type == 'all'))
