name: Autorox API Performance Tests

on:
  push:
    branches: [main, master]
    paths: ['k6-perf-tests/**']
  pull_request:
    branches: [main, master]
    paths: ['k6-perf-tests/**']
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Which test to run'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, load, stress, spike, soak, scalability, breakpoint, all]

jobs:

  # ── SMOKE ───────────────────────────────────
  smoke:
    name: Smoke Test (5 VUs · 2 min)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'smoke' || github.event.inputs.test_type == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Smoke Test
        env:
          PERF_BASE_URL:  ${{ secrets.PERF_BASE_URL }}
          PERF_USERNAME:  ${{ secrets.PERF_USERNAME }}
          PERF_PASSWORD:  ${{ secrets.PERF_PASSWORD }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
        run: |
          mkdir -p k6-perf-tests/results
          CLOUD_OUT=""
          [ -n "$K6_CLOUD_TOKEN" ] && CLOUD_OUT="--out cloud"
          k6 run k6-perf-tests/smoke-test.js \
            --out json=k6-perf-tests/results/smoke_ci.json \
            --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            $CLOUD_OUT \
            2>&1 | tee k6-perf-tests/results/smoke_ci.log || true

      - name: Regression Gate
        if: always()
        run: |
          python3 k6-perf-tests/check_regression.py \
            smoke k6-perf-tests/results/smoke_ci.log 20

      - name: Post Job Summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "✓|✗|checks_|http_req_duration|http_req_failed|iterations" \
            k6-perf-tests/results/smoke_ci.log | tail -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on Failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \":red_circle: *Autorox Smoke Test FAILED* — Run #${{ github.run_number }}\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"View Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }]
            }"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ github.run_number }}
          path: k6-perf-tests/results/smoke_ci.*
          retention-days: 30

  # ── LOAD ────────────────────────────────────
  load:
    name: Load Test (250 VUs · 13 min)
    runs-on: ubuntu-latest
    needs: smoke
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'load' || github.event.inputs.test_type == 'all'))
