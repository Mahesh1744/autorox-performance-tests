  # ── SOAK ────────────────────────────────────
  soak:
    name: Soak Test (15 VUs · 34 min)
    runs-on: ubuntu-latest
    needs: load
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'soak' || github.event.inputs.test_type == 'all'))
