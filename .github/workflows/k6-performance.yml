  # ── SCALABILITY ─────────────────────────────
  scalability:
    name: Scalability Test (50→1000 VUs · 21 min)
    runs-on: ubuntu-latest
    needs: load
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'scalability' || github.event.inputs.test_type == 'all'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Scalability Test
        env:
          PERF_BASE_URL:  ${{ secrets.PERF_BASE_URL }}
          PERF_USERNAME:  ${{ secrets.PERF_USERNAME }}
          PERF_PASSWORD:  ${{ secrets.PERF_PASSWORD }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
        run: |
          mkdir -p k6-perf-tests/results
          CLOUD_OUT=""
          [ -n "$K6_CLOUD_TOKEN" ] && CLOUD_OUT="--out cloud"
          k6 run k6-perf-tests/scalability-test.js \
            --out json=k6-perf-tests/results/scalability_ci.json \
            --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            $CLOUD_OUT \
            2>&1 | tee k6-perf-tests/results/scalability_ci.log || true

      - name: Regression Gate
