  # ── SPIKE ───────────────────────────────────
  spike:
    name: Spike Test (100→800 VUs · 12 min)
    runs-on: ubuntu-latest
    needs: smoke
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'spike' || github.event.inputs.test_type == 'all'))
