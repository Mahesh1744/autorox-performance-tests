          grep -E "✓|✗|checks_|http_req_duration|http_req_failed|iterations" \
            k6-perf-tests/results/load_ci.log | tail -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-results-${{ github.run_number }}
          path: k6-perf-tests/results/load_ci.*
          retention-days: 30

  # ── STRESS ──────────────────────────────────
  stress:
    name: Stress Test (10→100 VUs · 11 min)
    runs-on: ubuntu-latest
    needs: load
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'stress' || github.event.inputs.test_type == 'all'))
